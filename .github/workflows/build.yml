name: Build APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  release:
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="v$VERSION"
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Version: $VERSION → Tag: $TAG"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install Android SDK 37
        run: |
          export SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_ROOT" "platforms;android-37.0" "build-tools;37.0.0"
          # AGP 8.7 expects android-37 not android-37.0 — rename dir AND fix registry
          mv "$SDK_ROOT/platforms/android-37.0" "$SDK_ROOT/platforms/android-37"
          sed -i 's|platforms;android-37.0|platforms;android-37|g' "$SDK_ROOT/platforms/android-37/package.xml"
          sed -i 's|<api-level>37.0</api-level>|<api-level>37</api-level>|g' "$SDK_ROOT/platforms/android-37/package.xml"
          ls "$SDK_ROOT/platforms/" | grep android-37

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists, skipping"
          else
            git tag "${{ steps.version.outputs.tag }}"
            git push origin "${{ steps.version.outputs.tag }}"
            echo "Tag ${{ steps.version.outputs.tag }} pushed"
          fi

      - name: Create Release and upload APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK: $APK"
          gh release create "${{ steps.version.outputs.tag }}" --title "${{ steps.version.outputs.tag }}" --generate-notes 2>/dev/null || true
          gh release upload "${{ steps.version.outputs.tag }}" "$APK" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install Android SDK 37
        run: |
          export SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          yes | "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$SDK_ROOT" "platforms;android-37.0" "build-tools;37.0.0"
          # AGP 8.7 expects android-37 not android-37.0 — rename dir AND fix registry
          mv "$SDK_ROOT/platforms/android-37.0" "$SDK_ROOT/platforms/android-37"
          sed -i 's|platforms;android-37.0|platforms;android-37|g' "$SDK_ROOT/platforms/android-37/package.xml"
          sed -i 's|<api-level>37.0</api-level>|<api-level>37</api-level>|g' "$SDK_ROOT/platforms/android-37/package.xml"
          ls "$SDK_ROOT/platforms/" | grep android-37

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PokeChainMobile-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
